<!DOCTYPE html>
<html class="light" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Alterar Senha - Sys RH SEPLAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "body": ["Public Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white flex items-center justify-center min-h-screen">
    <div
        class="w-full max-w-md p-8 bg-white dark:bg-[#1e2936] rounded-xl shadow-lg border border-slate-200 dark:border-slate-700">
        <div class="text-center mb-8">
            <div class="size-12 bg-primary/10 rounded-xl flex items-center justify-center text-primary mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
                    stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Alterar Senha</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Por segurança, você precisa definir uma nova senha para
                continuar.</p>
        </div>

        <form id="change-password-form" class="space-y-6">
            <div>
                <label for="new-password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nova
                    Senha</label>
                <input type="password" id="new-password" required minlength="6"
                    class="mt-1 block w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm"
                    placeholder="Mínimo 6 caracteres">
            </div>
            <div>
                <label for="confirm-password"
                    class="block text-sm font-medium text-slate-700 dark:text-slate-300">Confirmar Nova Senha</label>
                <input type="password" id="confirm-password" required minlength="6"
                    class="mt-1 block w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-700 text-slate-900 dark:text-white focus:ring-primary focus:border-primary sm:text-sm"
                    placeholder="Repita a nova senha">
            </div>

            <button type="submit"
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                Atualizar Senha
            </button>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        document.getElementById('change-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                alert('As senhas não coincidem.');
                return;
            }

            if (newPassword.length < 6) {
                alert('A senha deve ter pelo menos 6 caracteres.');
                return;
            }

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ newPassword })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.msg || 'Erro ao alterar senha');
                }

                alert('Senha alterada com sucesso!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>

</html>
