<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Encoding</title>
</head>

<body>
    <h1>Debug Encoding</h1>
    <div id="output">Loading...</div>

    <script>
        async function debug() {
            try {
                const response = await fetch('/api/servidores?limit=100&search=Concei');
                const data = await response.json();
                const output = document.getElementById('output');
                output.innerHTML = '';

                if (data.servidores.length === 0) {
                    output.innerHTML = 'No servers found with "Concei". Trying generic search...';
                    const res2 = await fetch('/api/servidores?limit=10');
                    const data2 = await res2.json();
                    data.servidores = data2.servidores;
                }

                data.servidores.forEach(s => {
                    const div = document.createElement('div');
                    div.style.border = '1px solid #ccc';
                    div.style.margin = '10px';
                    div.style.padding = '10px';

                    let hex = '';
                    for (let i = 0; i < s.NOME_SERV.length; i++) {
                        const code = s.NOME_SERV.charCodeAt(i);
                        hex += code.toString(16).padStart(4, '0') + ' ';
                    }

                    div.innerHTML = `
                        <p><strong>Name:</strong> ${s.NOME_SERV}</p>
                        <p><strong>Char Codes (Hex):</strong> ${hex}</p>
                        <p><strong>Contains \\uFFFD (?):</strong> ${s.NOME_SERV.includes('\uFFFD')}</p>
                    `;
                    output.appendChild(div);
                });
            } catch (e) {
                document.getElementById('output').innerText = 'Error: ' + e.message;
            }
        }
        debug();
    </script>
</body>

</html>
